limit_req_zone $binary_remote_addr zone=exam_planner_login:10m rate=6r/m;
limit_req_status 429;

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    listen 8088;
    server_name _;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript application/json application/manifest+json image/svg+xml;

    location ^~ /assets/ {
        alias /opt/exam-planner/dist/assets/;
        access_log off;
        add_header Cache-Control public,max-age=31536000,immutable always;
        try_files $uri =404;
    }

    location = /login {
        limit_req zone=exam_planner_login burst=3 nodelay;
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
